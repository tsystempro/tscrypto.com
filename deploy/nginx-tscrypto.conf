# ─────────────────────────────────────────────────────────────────────────
# nginx для tscrypto.com — статика Tilda + двуязычие (/ и /en/) + блог.
#
# Блог прегенерируется в ФИЗИЧЕСКИЕ файлы:
#   public/blogs/<slug>/index.html       — RU
#   public/en/blogs/<slug>/index.html    — EN
# Поэтому /blogs/** и /en/blogs/** надо отдавать как реальные файлы, а НЕ через
# SPA-rewrite для /en/. Два блока ниже (помечены «← ДОБАВЛЕНО») — единственное
# изменение относительно прежнего конфига; всё остальное без изменений.
# ─────────────────────────────────────────────────────────────────────────

server {
    server_name tscrypto.com www.tscrypto.com;
    root /var/www/tscrypto.com/public;
    index index.html;

    # Своя страница вместо голого «404 Not Found» (как ErrorDocument в htaccess).
    error_page 403 404 /404.html;

    # ← ДОБАВЛЕНО: физические файлы блога (должны идти ВЫШЕ rewrite для /en/)
    location ^~ /blogs/ {
        try_files $uri $uri/ /blogs/index.html =404;
    }
    location ^~ /en/blogs/ {
        try_files $uri $uri/ /en/blogs/index.html =404;
    }

    # Английская версия главной — та же index.html через rewrite
    location ^~ /en/ {
        rewrite ^/en/(.*)$ /$1 last;
    }

    # Статика с кэшем
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1d;
    }

    # Всё остальное (главная + Tilda)
    location / {
        try_files $uri $uri/ /page146509386.html =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tscrypto.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tscrypto.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.tscrypto.com) {
        return 301 https://tscrypto.com$request_uri;
    }
    if ($host = tscrypto.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name tscrypto.com www.tscrypto.com;
    return 404;
}
